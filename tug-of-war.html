<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شد الحبل الرقمي</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="back-nav">
        <button onclick="location.href='index.html'">⬅️ العودة للرئيسية</button>
    </div>

    <h1>⚓ شد الحبل الرقمي ⚓</h1>

    <div class="system-panel">
        <div class="team-card" id="card-teamA" onclick="selectTeam('teamA')">
            <div class="team-marker marker-a"></div>
            <h3>الفريق (أ)</h3>
            <div class="score" id="scoreA">0</div>
            <div class="rope-power">القوة: <span id="powerA">50</span>%</div>
            <span class="status-text">اضغط للتفعيل</span>
        </div>

        <div class="ai-control">
            <button id="btn-pull" onclick="startPull()">اسحب الحبل 💪</button>
            <div class="question-display" id="question-box">اختر الفريق أولاً، ثم اضغط لسحب الحبل...</div>
            <div class="action-buttons" id="action-btns" style="display: none;">
                <button class="btn-success" onclick="verifyAnswer(true)">إجابة صحيحة (سحب) ✅</button>
                <button class="btn-fail" onclick="verifyAnswer(false)">إجابة خاطئة (خسارة) ❌</button>
            </div>
        </div>

        <div class="team-card" id="card-teamB" onclick="selectTeam('teamB')">
            <div class="team-marker marker-b"></div>
            <h3>الفريق (ب)</h3>
            <div class="score" id="scoreB">0</div>
            <div class="rope-power">القوة: <span id="powerB">50</span>%</div>
            <span class="status-text">اضغط للتفعيل</span>
        </div>
    </div>

    <div class="tug-container">
        <div class="rope-track">
            <div class="rope-marker" id="rope-marker"></div>
            <div class="team-zone zone-a" id="zone-a"></div>
            <div class="team-zone zone-b" id="zone-b"></div>
        </div>
        <div class="tug-legend">
            <div class="legend-item">
                <span class="legend-color zone-a"></span>
                <span>منطقة الفريق (أ)</span>
            </div>
            <div class="legend-item">
                <span class="legend-color zone-b"></span>
                <span>منطقة الفريق (ب)</span>
            </div>
        </div>
    </div>

    <audio id="sound-success" src="assets/sounds/success.mp3" preload="auto"></audio>
    <audio id="sound-fail" src="assets/sounds/fail.mp3" preload="auto"></audio>
    <audio id="sound-click" src="assets/sounds/click.mp3" preload="auto"></audio>

    <script src="js/ai-handler.js"></script>
    <script src="js/tug-logic.js"></script>
</body>
</html>
